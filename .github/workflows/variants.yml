name: Generate variant branches

on:
  push:
    branches:
      - '**'

permissions:
  contents: write

jobs:
  variant:
    runs-on: ubuntu-latest
    # Don't process a branch that's itself a generated variant branch
    if: >
      !endsWith(github.ref_name, '-variant')
    strategy:
      fail-fast: false
      matrix:
        variant: [type-variables-simple]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply patch series
        id: apply
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          target="${{ github.ref_name }}-${{ matrix.variant }}-variant"
          git checkout -b "$target"
          sh patches/${{ matrix.variant }}/apply.sh

      - run: cargo test

      - name: Publish variant branch
        run: |
          target="${{ github.ref_name }}-${{ matrix.variant }}-variant"
          git push --force origin "HEAD:refs/heads/$target"